<div class="card-grid">
  {% for card in module.cards %}
    <a class="card" href="{{ card.link_href }}">
      <svg class="card-icon" viewBox="0 0 34 20" fill="none" aria-hidden="true">
        <line x1="17" y1="1" x2="17" y2="19" class="mark-stem" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        {% if card.icon_variant == "enrollem" %}
          <line x1="5" y1="4" x2="17" y2="4" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="5" y1="10" x2="17" y2="10" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="5" y1="16" x2="17" y2="16" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        {% elif card.icon_variant == "formid" %}
          <line x1="17" y1="5" x2="28" y2="1" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="17" y1="11" x2="28" y2="11" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="17" y1="17" x2="28" y2="19" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        {% else %}
          <line x1="5" y1="7" x2="17" y2="7" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="17" y1="13" x2="29" y2="13" class="mark-notch" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        {% endif %}
      </svg>
      <h3>{{ card.heading }}</h3>
      {{ card.body }}
      {% if card.badge_text %}<span class="badge">{{ card.badge_text }}</span>{% endif %}
      <span class="go">{{ card.link_label }}</span>
    </a>
  {% endfor %}
</div>

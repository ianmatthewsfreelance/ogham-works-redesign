<div class="team-grid">
  {% for member in module.members %}
    <div class="team-card">
      <div class="team-photo-wrap">
        <div class="team-photo-accent" aria-hidden="true"></div>
        {% if member.photo.src %}
          <img class="team-photo" src="{{ member.photo.src }}" alt="{{ member.photo.alt }}" loading="lazy">
        {% else %}
          <div class="team-photo team-photo-placeholder" aria-hidden="true"></div>
        {% endif %}
      </div>
      <h3>{{ member.full_name }}</h3>
      <p class="team-role">{{ member.role }}</p>
      {% if member.bio %}<div class="team-bio">{{ member.bio }}</div>{% endif %}
      {% if member.link_href %}<a class="team-link" href="{{ member.link_href }}">{{ member.link_label }}</a>{% endif %}
    </div>
  {% endfor %}
</div>
